name: CI — Money Service

on:
  push:
    paths:
      - 'money-service/**'
  pull_request:
    paths:
      - 'money-service/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t money-service ./money-service

      - name: Run tests
        run: |
          docker run --rm money-service \
            python -m pytest tests/ -v --tb=short
